  <body onload="onLoad()">
    <div class="main-div">
      <div class="top-div">
        <h2>IP Address Tracker</h2>
        <div class="search-box-div">
          <input
            type="text"
            id="search_ip"
            placeholder="Search for any IP address or domain IP Address Location"
          />
          <button type="button" id="button-search" onclick="searchIP()">
            <img src="./images/icon-arrow.svg" />
          </button>
        </div>
        <div class="result-div">
          <div class="sub-result-div">
            <label class="label-params">IP ADDRESS</label>
            <label class="label-content" id="res_ip"></label>
          </div>
          <div class="sub-result-div">
            <label class="label-params">LOCATION</label>
            <label class="label-content" id="res_loc"></label>
          </div>
          <div class="sub-result-div">
            <label class="label-params">TIMEZONE</label>
            <label class="label-content" id="res_timezone"></label>
          </div>
          <div class="sub-result-div">
            <label class="label-params">ISP</label>
            <label class="label-content" id="res_isp"></label>
          </div>
        </div>
      </div>

      <div id="map" class="map-div"></div>
      <div class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by <a href="#">Zhou Han Bao | copyright @March-2026</a>.
      </div>
    </div>

    <script>
      let lat = 51.505,
        lng = -0.09;
      //init map
      var map = L.map("map");
      //set default lat,lng
      map.setView([lat, lng], 13);
      //init draw map
      var drawMap = L.tileLayer(
        "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
          maxZoom: 19,
          attribution:
            '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        }
      );
      //marker icon
      var myIcon = L.icon({
        iconUrl: "./images/icon-location.svg",
        iconSize: [72, 95],
        iconAnchor: [22, 94],
        popupAnchor: [-3, -76],
      });

      //add marker
      var marker = L.marker([lat, lng], { icon: myIcon }).addTo(map);
      //draw default lat,lng
      drawMap.addTo(map);

      const onLoad = async () => {
        document.getElementById("search_ip").value = "";
        await searchIP();
      };

      const searchIP = async () => {
        const ip = document.getElementById("search_ip").value;
        const apikey = "at_bmH7xEPODwdBryXmPRrImK2PWSsgy";
        const url =
          "https://geo.ipify.org/api/v1?" +
          "apiKey=" +
          apikey +
          "&ipAddress=" +
          ip;

        try {
          let response = await fetch(url);
          if (!response.ok) {
            throw new Error(`Response status: ${response.status}`);
            return;
          }
          const result = await response.json();
          console.log(result);
          document.getElementById("res_ip").innerText = result.ip;
          document.getElementById(
            "res_loc"
          ).innerText = `${result.location.city},${result.location.region} ${result.location.postalCode}`;
          document.getElementById(
            "res_timezone"
          ).innerText = `UTC ${result.location.timezone}`;
          document.getElementById("res_isp").innerText = result.isp;

          lat = result.location.lat;
          lng = result.location.lng;
          map.setView([lat, lng], 13);
          L.marker([lat, lng], { icon: myIcon }).addTo(map);
          drawMap.addTo(map);
        } catch (err) {
          console.log(err);
        }
      };
    </script>
